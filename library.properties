sentence=Embedded BASIC interpreter for WS2812B LED strip animations on ESP8266 / ESP32.
paragraph=LedBasic is a non-blocking BASIC-like scripting engine for creating LED effects. Write scripts in plain text, compile to bytecode on the fly, and run animations alongside WiFi, MQTT, OTA and other tasks. Includes HSV/RGB commands, math functions (SIN8, COS8, EXP8, NOISE, MAP, CONSTRAIN), FADE/MIRROR effects, and a browser-based IDE with emulator.
category=Display
